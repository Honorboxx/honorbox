<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- The honour box: a stand with a slot cut into it, and a foot.
       Drawn on a 48 unit frame with every straight edge on a multiple of 3, so
       at 16px (one pixel is 3 units) and at 32px (1.5 units) the body, slot and
       foot land on whole pixels instead of smearing into grey. No plate behind
       it: at 16px the margin a plate needs is the difference between a readable
       mark and a smudge.
       The path sits low in its own frame so it can meet a wordmark's baseline
       in the lockup. Standing alone it is lifted 6 units, a whole pixel at
       16px, to centre it here.
       One colour, no accent. A coin that reads as gold on ink browns to 2.53:1
       on the cream the mark flips to at night, and a mark that only works in
       one colour scheme is half a mark. -->
  <style>
    .box { fill: #0a0a0a }
    @media (prefers-color-scheme: dark) {
      .box { fill: #fafafa }
    }
  </style>
  <g transform="translate(0,-6)">
    <path class="box" d="M9,15H39A3,3 0 0 1 42,18V42H6V18A3,3 0 0 1 9,15ZM4.5,39H43.5A1.5,1.5 0 0 1 45,40.5V43.5A1.5,1.5 0 0 1 43.5,45H4.5A1.5,1.5 0 0 1 3,43.5V40.5A1.5,1.5 0 0 1 4.5,39ZM18,24A3,3 0 0 0 15,27A3,3 0 0 0 18,30H30A3,3 0 0 0 33,27A3,3 0 0 0 30,24H18Z"/>
  </g>
</svg>
