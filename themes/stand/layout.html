<!doctype html>
<html lang="{{lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<meta name="description" content="{{description}}">
<link rel="canonical" href="{{canonical}}">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="stylesheet" href="./style.css">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:type" content="website">
<meta name="theme-color" content="#f6f1e7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191512" media="(prefers-color-scheme: dark)">
</head>
<body class="{{body_class}}">
<header class="site-head">
  <a class="brand" href="./"><svg class="brand-mark" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="3.9" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="3.4" y="10" width="17.2" height="11" rx="2.6" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="7.6" y="9" width="8.8" height="2.1" rx="1.05" fill="var(--accent)" stroke="none"/></svg>{{store_name}}</a>
  <nav class="site-nav">{{nav}}</nav>
</header>
<main>
{{content}}
</main>
<footer class="site-foot">
  <p class="foot-links">{{footer}}</p>
  <p class="foot-legal">© {{year}} · {{seller}} · Payments by Stripe · Runs on <a href="https://github.com/Honorboxx/honorbox">HonorBox</a></p>
</footer>
</body>
</html>
