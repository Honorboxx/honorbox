<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 88" role="img" aria-label="HonorBox">
  <style>
    .ink { stroke: #23201b; }
    .fill-ink { fill: #23201b; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #ece5d8; }
      .fill-ink { fill: #ece5d8; }
    }
  </style>
  <!-- mark: coin dropping into an honor box -->
  <g transform="translate(8,6)">
    <circle cx="36" cy="10.5" r="7" fill="none" class="ink" stroke-width="5"/>
    <rect x="9" y="30" width="54" height="36" rx="8" fill="none" class="ink" stroke-width="5"/>
    <rect x="22.5" y="27" width="27" height="6.4" rx="3.2" fill="#b5482a"/>
  </g>
  <!-- wordmark -->
  <text x="94" y="61" font-family="Iowan Old Style, Palatino Nova, Palatino, Georgia, serif"
        font-size="42" font-weight="700" letter-spacing="-0.5" class="fill-ink">HonorBox</text>
</svg>
